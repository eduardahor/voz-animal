name: Flutter CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar código
        run: flutter analyze

      - name: Rodar testes
        run: flutter test